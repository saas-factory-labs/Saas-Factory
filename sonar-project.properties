# SonarCloud Project Configuration
# Project: saas-factory-labs/Saas-Factory

# ============================================================================
# Issue Suppression Rules
# ============================================================================

sonar.issue.ignore.multicriteria=e1

# S8431: Docker image digest pinning (suppress with security justification)
#
# RATIONALE FOR SUPPRESSION:
# This project uses SHA256 digest-only pinning in Dockerfiles as a security best practice
# to prevent supply chain attacks. This is a deliberate security hardening measure.
#
# SECURITY CONTEXT:
# - Tag-only references (e.g., "mcr.microsoft.com/dotnet/aspnet:10.0") are vulnerable to
#   tag-mutation attacks where an attacker can push a malicious image with the same tag
# - Digest pinning (e.g., "@sha256:ddcf...") ensures the EXACT image is used, providing
#   cryptographic verification of image integrity
# - The tag is included as a comment for human readability and Dependabot compatibility
#   (e.g., "# mcr.microsoft.com/dotnet/aspnet:10.0")
#
# PATTERN USED:
#   # mcr.microsoft.com/dotnet/aspnet:10.0  <- Tag in comment for reference
#   FROM mcr.microsoft.com/dotnet/aspnet@sha256:ddcf... AS base  <- Digest pinning
#
# REFERENCES:
# - Docker Best Practices: https://docs.docker.com/develop/dev-best-practices/
# - SLSA Framework: https://slsa.dev/spec/v1.0/requirements#immutable-reference
# - NIST SP 800-190 (Application Container Security Guide)
#
# SonarCloud's S8431 rule incorrectly flags digest-only pinning as a code smell.
# This suppression acknowledges that our approach is MORE secure than tag-only references.
#
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S8431
sonar.issue.ignore.multicriteria.e1.resourceKey=**/Dockerfile*

# ============================================================================
# Additional Configuration
# ============================================================================

# Exclude generated code from analysis
sonar.exclusions=**/obj/**,**/bin/**,**/Migrations/**,**/*.Designer.cs,**/wwwroot/lib/**

# Exclude test files from duplication analysis
sonar.cpd.exclusions=**/*Tests.cs,**/*Test.cs

# ============================================================================
# Notes
# ============================================================================
# - Dependabot is configured to update digests automatically by reading the tag comments
# - This approach provides both security (digest pinning) and maintainability (Dependabot updates)
# - S8431 suppression is justified by security requirements and does not indicate technical debt
