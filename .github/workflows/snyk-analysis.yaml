name: "🛡️ Security: Snyk"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  snyk-code:
    name: Snyk - Open Source (All Languages)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup .NET
        uses: actions/setup-dotnet@baa11fbfe1d6520db94683bd5c7a3818018e4309  # v5.1.0
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: '22'

      - name: Restore .NET dependencies
        run: dotnet restore SaaS-Factory.sln

      - name: Install Cloudflare worker dependencies
        working-directory: Code/Cloudflare-Workers
        run: npm ci

      - name: Install Snyk CLI
        uses: snyk/actions/setup@8e119fbb6c251787721d34ba683ed48eba792766  # master 2026-05-27

      - name: Run Snyk - AppBlueprint.Web
        continue-on-error: true
        working-directory: Code/AppBlueprint/AppBlueprint.Web
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=AppBlueprint.Web.csproj --severity-threshold=high --sarif-file-output=${{ github.workspace }}/snyk-web.sarif

      - name: Run Snyk - AppBlueprint.ApiService
        continue-on-error: true
        working-directory: Code/AppBlueprint/AppBlueprint.ApiService
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=AppBlueprint.ApiService.csproj --severity-threshold=high --sarif-file-output=${{ github.workspace }}/snyk-api.sarif

      - name: Run Snyk - AppBlueprint.AppGateway
        continue-on-error: true
        working-directory: Code/AppBlueprint/AppBlueprint.AppGateway
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=AppBlueprint.AppGateway.csproj --severity-threshold=high --sarif-file-output=${{ github.workspace }}/snyk-gateway.sarif

      - name: Run Snyk - Cloudflare Worker
        continue-on-error: true
        working-directory: Code/Cloudflare-Workers
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=package.json --severity-threshold=high --sarif-file-output=${{ github.workspace }}/snyk-cloudflare-worker.sarif

      - name: Upload Snyk results - Web
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always() && hashFiles('snyk-web.sarif') != ''
        with:
          sarif_file: snyk-web.sarif
          category: snyk-web

      - name: Upload Snyk results - ApiService
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always() && hashFiles('snyk-api.sarif') != ''
        with:
          sarif_file: snyk-api.sarif
          category: snyk-api

      - name: Upload Snyk results - AppGateway
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always() && hashFiles('snyk-gateway.sarif') != ''
        with:
          sarif_file: snyk-gateway.sarif
          category: snyk-gateway

      - name: Upload Snyk results - Cloudflare Worker
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always() && hashFiles('snyk-cloudflare-worker.sarif') != ''
        with:
          sarif_file: snyk-cloudflare-worker.sarif
          category: snyk-cloudflare-worker

  snyk-docker:
    name: Snyk - Docker Container Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - path: Code/AppBlueprint/AppBlueprint.Web/Dockerfile
            image: appblueprint-web
            context: Code/AppBlueprint
          - path: Code/AppBlueprint/AppBlueprint.ApiService/Dockerfile
            image: appblueprint-apiservice
            context: Code/AppBlueprint
          - path: Code/AppBlueprint/AppBlueprint.AppGateway/Dockerfile
            image: appblueprint-gateway
            context: Code/AppBlueprint

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install Snyk CLI
        uses: snyk/actions/setup@8e119fbb6c251787721d34ba683ed48eba792766  # master 2026-05-27

      - name: Build Docker image
        run: docker build -f ${{ matrix.dockerfile.path }} -t ${{ matrix.dockerfile.image }}:latest ${{ matrix.dockerfile.context }}

      - name: Run Snyk container scan
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: >
          snyk container test ${{ matrix.dockerfile.image }}:latest
          --severity-threshold=high
          --sarif-file-output=snyk-${{ matrix.dockerfile.image }}.sarif
          --file=${{ matrix.dockerfile.path }}

      - name: Upload container scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always()
        with:
          sarif_file: snyk-${{ matrix.dockerfile.image }}.sarif
          category: snyk-docker-${{ matrix.dockerfile.image }}
