name: "🛡️ Security: Snyk"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  snyk-code:
    name: Snyk - Open Source (All Languages)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore .NET dependencies
        run: dotnet restore SaaS-Factory.sln

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk - AppBlueprint.Web
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=Code/AppBlueprint/AppBlueprint.Web/AppBlueprint.Web.csproj --severity-threshold=high --sarif-file-output=snyk-web.sarif

      - name: Run Snyk - AppBlueprint.ApiService
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=Code/AppBlueprint/AppBlueprint.ApiService/AppBlueprint.ApiService.csproj --severity-threshold=high --sarif-file-output=snyk-api.sarif

      - name: Run Snyk - AppBlueprint.AppGateway
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=Code/AppBlueprint/AppBlueprint.AppGateway/AppBlueprint.AppGateway.csproj --severity-threshold=high --sarif-file-output=snyk-gateway.sarif

      - name: Upload Snyk results - Web
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('snyk-web.sarif') != ''
        with:
          sarif_file: snyk-web.sarif
          category: snyk-web

      - name: Upload Snyk results - ApiService
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('snyk-api.sarif') != ''
        with:
          sarif_file: snyk-api.sarif
          category: snyk-api

      - name: Upload Snyk results - AppGateway
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('snyk-gateway.sarif') != ''
        with:
          sarif_file: snyk-gateway.sarif
          category: snyk-gateway

  snyk-docker:
    name: Snyk - Docker Container Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - path: Code/AppBlueprint/AppBlueprint.Web/Dockerfile
            image: appblueprint-web
            context: Code/AppBlueprint
          - path: Code/AppBlueprint/AppBlueprint.ApiService/Dockerfile
            image: appblueprint-apiservice
            context: Code/AppBlueprint
          - path: Code/AppBlueprint/AppBlueprint.AppGateway/Dockerfile
            image: appblueprint-gateway
            context: Code/AppBlueprint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Build Docker image
        run: docker build -f ${{ matrix.dockerfile.path }} -t ${{ matrix.dockerfile.image }}:latest ${{ matrix.dockerfile.context }}

      - name: Run Snyk container scan
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: >
          snyk container test ${{ matrix.dockerfile.image }}:latest
          --severity-threshold=high
          --sarif-file-output=snyk-${{ matrix.dockerfile.image }}.sarif
          --file=${{ matrix.dockerfile.path }}

      - name: Upload container scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-${{ matrix.dockerfile.image }}.sarif
          category: snyk-docker-${{ matrix.dockerfile.image }}