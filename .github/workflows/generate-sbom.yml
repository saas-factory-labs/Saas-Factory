name: "🛡️ Security: Generate SBOM (DEPRECATED - Use Enhanced)"

# ⚠️ DEPRECATED: This workflow is deprecated
# Use generate-sbom-enhanced.yml instead for:
# - Multi-format SBOMs (SPDX + CycloneDX)
# - Multi-ecosystem coverage (.NET, npm, Docker)
# - Vulnerability scanning (Grype, Trivy, OSV)
# - License compliance checking
# - SBOM attestation and signing

on:
  workflow_dispatch:
    inputs:
      legacy_mode:
        description: 'Run legacy SBOM (not recommended)'
        required: true
        default: false
        type: boolean

jobs:
  deprecation-notice:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Deprecation Warning
        run: |
          cat << 'EOF'
          ⚠️  WARNING: DEPRECATED WORKFLOW
          =====================================

          This workflow is deprecated and will be removed in a future release.

          Please use: .github/workflows/generate-sbom-enhanced.yml

          Enhanced features include:
          ✅ Multi-format SBOMs (SPDX 2.3 + CycloneDX 1.6)
          ✅ Multi-ecosystem (.NET, npm, Docker)
          ✅ Vulnerability scanning (Grype, Trivy, OSV)
          ✅ License compliance checking
          ✅ SBOM attestation and signing
          ✅ PR integration with automatic comments

          See: docs/SBOM-GUIDE.md for migration guide
          =====================================
          EOF
          exit 1

  generate-sbom:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: github.event.inputs.legacy_mode == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@ab5c1da94f53f5cd75c1038092aa276dddfccbba  # v1.9.0

      - name: Generate SBOM
        uses: anchore/sbom-action@28d71544de8eaf1b958d335707167c5f783590ad  # v0.22.2
        with:
          image: your-docker-image:latest # Replace with your Docker image - Github package registry
          output: sbom.json             # Optional: name of the SBOM file
          path: .                       # Optional: path to generate SBOM for

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: sbom
          path: sbom.json




